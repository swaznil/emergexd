<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>01</title>

    <link rel="stylesheet" href = "style01.css">
</head>

<body>

    <canvas id="life01"></canvas>

    <div id="overlay"></div>
        <div id="topBar">
            <a href="../index.html" class="back-btn">← Back</a>
            <div id="fps">FPS: 0</div>
        </div>
        
        <button onclick="resetParticles()"> Reset </button>  
   
    <div id = "controls">
    
        <div class = "panel">
            <h3>Create Group</h3>

            <input id="groupName" placeholder="group name">
            <select id="groupColor">
                <option value="red">Red</option>
                <option value="lime">Green</option>
                <option value="blue">Blue</option>
                <option value="yellow">Yellow</option>
                <option value="cyan">Cyan</option>
                <option value="magenta">Magenta</option>
                <option value="white">White</option>
            </select>
            <input id="groupCount" type="number" value="200" min="1" max="5000">
            <button onclick="addGroup()"> Create Group </button>
        </div>

        <div class="panel">
            <h2>Presets</h2>

            <button onclick="presetChaos()">Chaos</button>
            <button onclick="presetNotChaos()">Not Chaos</button>
            <button onclick="presetOrbit()">Orbit</button>
        </div>

        <div id = "groupContainer"></div>
        </div>
    </div>
    <script src="canvas.js"></script>
    <script src="preset.js"></script>
</body>
</html>
