<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>01</title>

    <link rel="stylesheet" href = "style01.css">
</head>

<body>

    <canvas id="life01"></canvas>

    <header id="topBar">

        <a href="../index.html" class="back-btn">
            ← Back
        </a>

        <div id="stats">
            60 FPS · 3000 Particles · 4 Groups
        </div>

        <button
            id="helpBtn"
            class="icon-btn"
            onclick="toggleHelp()"
            title="Help">
            ?
        </button>

    </header>

    <aside id="controls">
        <section class="panel">
            <h2>Create Group</h2>
            <input
                id="groupName"
                placeholder="Group name">

            <select id="groupColor">
                <option value="red">Red</option>
                <option value="lime">Green</option>
                <option value="blue">Blue</option>
                <option value="yellow">Yellow</option>
                <option value="cyan">Cyan</option>
                <option value="magenta">Magenta</option>
                <option value="white">White</option>
            </select>

            <input
                id="groupCount"
                type="number"
                value="500">

            <button onclick="addGroup()">
                Create
            </button>

        </section>

        <section class="panel">

            <h2>Presets</h2>
            <button onclick="presetGalaxy()">Galaxy</button>
            <button onclick="presetEcosystem()">Ecosystem</button>
            <button onclick="presetFlocking()">Flocking</button>
            <button onclick="presetHunters()">Hunters</button>
            <button onclick="presetChaos()">Chaos</button>

        </section>

        <section class="panel">
            <div class="panel-header">
                <h2>Interactions</h2>
                <button onclick="randomizeMatrix()">Randomize</button>
            </div>

            <div id="matrixContainer"></div>
        </section>
    </aside>

    <div id="simControls">
        <button
            class="sim-btn"
            onclick="resetParticles()">
            ↺
        </button>

        <button
            id="pauseBtn"
            class="sim-btn primary"
            onclick="togglePause()">
            ⏸
        </button>

        <button
            class="sim-btn"
            onclick="stepSimulation()">
            ⏭
        </button>

    </div>

    <div id="helpPanel" class="hidden">
        <div class="panel-header">
            <h2>Help</h2>

            <button
                class="close-btn"
                onclick="toggleHelp()">
                ✕
            </button>

        </div>

        <p>
            Small particle life simulation.
        </p>

        <ul>
            <li>Right click + drag → Move camera</li>
            <li>Mouse wheel → Zoom</li>
            <li>Positive values → Attraction</li>
            <li>Negative values → Repulsion</li>
        </ul>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/pixi.js@7/dist/pixi.min.js"></script>

    <script src="canvas.js"></script>
    <script src="preset.js"></script>
</body>
</html>
