<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>01</title>

    <link rel="stylesheet" href = "style01.css">
</head>

<body>
    <canvas id="life01"></canvas>
    <a href="../index.html" class="back-btn">← Back</a>
    
    <div id="fps">FPS: 0</div>

    <button onclick="resetParticles()" style="display: block; margin: 0 auto;"> Reset </button>


    <div id = "controls">
        <div id="creator">
        
        <h2>Create Group</h2>
        <input id="groupName" placeholder="group name">
        <input id="groupColor" type="color" value="#ff0000">
        <input id="groupCount"
            type="number"
            value="200"
            min="1"
            max="5000">
        <button onclick="addGroup()"> Create Group </button>

        </div>

        <h2>Presets</h2>
        <button onclick="presetChaos()">Chaos</button>
        <button onclick="presetNotChaos()">NotChaos</button>

        <div id = "groupContainer"></div>
    </div>

<script src="canvas.js"></script>
</body>
</html>
