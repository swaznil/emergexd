<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>01</title>

    <style>
    body{
        background:dimgray;
        color: white;
        font-family:Arial;
    }

    #controls{
        padding:10px;
    }

    .group{
        border:1px solid white;
        padding:10px;
        margin:10px 0;
    }
    </style>
</head>

<body>
    <canvas id="life01"></canvas>

    <div id = "controls">
        <button onclick="addGroup()">Add group</button>
        <button onclick="applyRules()">Apply Rules</button>
        <button onclick="resetParticles()">Reset</button>

        <div id = "groupContainer"></div>
    </div>

<script>

    const canvas = document.getElementById("life01");
    const m = canvas.getContext("2d");
    
    resizeCanvas();

    function resizeCanvas() {
        canvas.width = window.innerWidth * 0.8;
        canvas.height = window.innerHeight * 0.8;
    }

    window.addEventListener("resize", resizeCanvas);

    function draw(x,y,c,s){
        m.fillStyle = c
        m.fillRect(x,y,s,s)
    }

    particles = []

    function particle(x,y,c){
        return{"x":x, "y":y, "vx":0, "vy":0, "color":c}
    }

    function randomW(){
        return Math.random() * canvas.width
    }

    function randomH(){
        return Math.random() * canvas.height
    }

    function create(number,color){
        let group=[]
        for(let i = 0; i < number; i++){
            group.push(particle(randomW(), randomH(), color))
            particles.push(group[i])
        }
        return group
    }

    function rule(particles1, particles2, g){
        for(let i=0; i < particles1.length; i++){

            let fx = 0;
            let fy = 0;
            let a = particles1[i];

            for(let j =0; j<particles2.length; j++){

                let b = particles2[j];
                let dx = a.x - b.x;
                let dy = a.y - b.y;
                let d = Math.sqrt(dx*dx + dy*dy);

                if(d >0 && d < 50 ){
                    let F = g /d;
                    fx += F*dx/d;
                    fy += F*dy/d;
                }
            }
                
            a.vx = (a.vx + fx) *0.4;
            a.vy = (a.vy + fy) *0.4;

            a.x += a.vx;
            a.y += a.vy;

            if (a.x <= 0 || a.x >= canvas.width){ a.vx *= -1}
            if(a.y <= 0 || a.y >= canvas.height){ a.vy *= -1}
        }
    }

    let groups = {};
    let rules = [];
    
    function addGroup(){

        const name = prompt("Group name?");
        const color = prompt("Color?");
        const count = parseInt(prompt("Particle count?"));

        groups[name] = create(count, color);

        const div = document.createElement("div");
        div.className = "group";

        div.innerHTML = `
            <h3>${name}</h3>

            <label>Attract/Repel With:</label>
            <input id="${name}-target" placeholder="target group">

            <label>Force:</label>
            <input id="${name}-force" type="number" step="0.01">

            <button onclick="saveRule('${name}')">Save Rule</button>
        `;

        document.getElementById("groupContainer").appendChild(div);
    }

    function saveRule(name){

        const target =
            document.getElementById(`${name}-target`).value;

        const force =
            parseFloat(
                document.getElementById(`${name}-force`).value
            );

        rules.push({
            a:name,
            b:target,
            g:force
        });

        console.log(rules);
    }   


    function update(){
        for(let r of rules){
            rule(groups[r.a],groups[r.b],r.g);
        }
        
        m.clearRect(0,0,canvas.width,canvas.height)
        m.fillStyle = "black";
        m.fillRect(0,0,canvas.width,canvas.height);
        for(let i=0; i<particles.length; i++){
            draw(particles[i].x, particles[i].y,
            particles[i].color, 5)
        }
        requestAnimationFrame(update)
    }

    update();

    function resetParticles(){
        particles = [];
        for(let key in groups){
            const old = groups[key];
            groups[key] = create(old.length,old[0].color);
        }
    }
</script>
</body>
</html>
